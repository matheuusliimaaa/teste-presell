<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trabalho Garantido</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4a017;
      --gold-light: #f0c842;
      --dark: #0d0d1a;
      --dark2: #13131f;
      --green-wa: #25D366;
      --green-wa-dark: #1ebe5d;
      --muted: #e5e7eb;
    }

    body {
      background: var(--dark);
      font-family: 'Lato', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Subtle ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212,160,23,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(212,160,23,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 20px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    /* Decorative top line */
    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      justify-content: center;
    }
    .ornament span {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament span:last-child {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .ornament svg {
      fill: var(--gold);
      width: 16px;
      height: 16px;
    }

    /* Title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 8vw, 2.4rem);
      line-height: 1.25;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #c8860a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.01em;
      text-shadow: none;
      animation: fadeDown 0.8s ease both;
    }

    /* Subtitle line */
    .subtitle {
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,160,23,0.7);
      animation: fadeDown 0.9s 0.1s ease both;
    }

    /* ── VIDEO CONTAINER (padrão Lovable) ── */
    .video-container {
      width: 100%;
      max-width: 300px;
      margin: 0 auto 12px;
      border-radius: 12px;
      border: 2px solid rgba(212,160,23,0.35); /* borda dourada para combinar com o tema */
      overflow: hidden;
      box-shadow:
        0 25px 50px -12px rgb(0 0 0 / 0.25),
        0 0 40px rgba(212,160,23,0.08); /* glow sutil dourado da presell */
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .video-wrapper {
      position: relative;
      padding-top: 177.7777%; /* aspect ratio 9:16 */
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Desktop: aumenta para 576px */
    @media (min-width: 640px) {
      .video-container {
        max-width: 36rem; /* 576px */
        margin-bottom: 32px;
      }
    }
    /* ── FIM VIDEO CONTAINER ── */

    /* WhatsApp button */
    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--green-wa);
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.03em;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      width: 100%;
      max-width: 340px;
      box-shadow:
        0 4px 24px rgba(37,211,102,0.35),
        0 0 0 0 rgba(37,211,102,0.5);
      animation: fadeUp 1s 0.35s ease both, pulse 2.2s 1.5s infinite;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-whatsapp:hover {
      background: var(--green-wa-dark);
      transform: scale(1.03);
    }

    .btn-whatsapp svg {
      width: 22px;
      height: 22px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* Footer note */
    .footer-note {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
      animation: fadeUp 1s 0.5s ease both;
    }

    /* Keyframes */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%   { box-shadow: 0 4px 24px rgba(37,211,102,0.35), 0 0 0 0 rgba(37,211,102,0.5); }
      60%  { box-shadow: 0 4px 24px rgba(37,211,102,0.35), 0 0 0 14px rgba(37,211,102,0); }
      100% { box-shadow: 0 4px 24px rgba(37,211,102,0.35), 0 0 0 0 rgba(37,211,102,0); }
    }
  </style>
</head>

</body>
</html>
